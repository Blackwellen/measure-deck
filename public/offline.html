<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeasureDeck — Offline</title>
</head>
<body style="font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#0f172a;color:#fff">
  <div style="text-align:center;padding:24px">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 192 192" style="margin:0 auto 24px">
      <rect width="192" height="192" rx="32" fill="#3b82f6"/>
      <text x="96" y="130" font-family="system-ui" font-size="100" font-weight="700" text-anchor="middle" fill="white">M</text>
    </svg>
    <h1 style="font-size:24px;font-weight:700;margin:0 0 12px">You're offline</h1>
    <p style="color:#94a3b8;margin:0 0 24px;max-width:320px">MeasureDeck requires an internet connection. Please check your connection and try again.</p>
    <button onclick="window.location.reload()" style="background:#3b82f6;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:600">Try Again</button>
  </div>
</body>
</html>
